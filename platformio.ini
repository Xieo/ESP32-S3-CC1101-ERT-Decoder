[platformio]
default_envs = s3-wifi
build_cache_dir = .cache

[env]
platform      = espressif32 @ 6.6.0
board         = esp32-s3-devkitc-1
framework     = arduino
monitor_speed = 115200
build_flags   = -D ARDUINO_USB_CDC_ON_BOOT=1
                -D RF_MODULE_CS=10
                -D RF_MODULE_GDO0=4
                -D RF_MODULE_GDO2=5
                -D RF_MODULE_SCK=9
                -D RF_MODULE_MISO=13
                -D RF_MODULE_MOSI=11
                -D RF_CC1101
                -D RTL_DEBUG=0
                -D MINIMUM_PULSE_LENGTH=10
                -D MINIMUM_SIGNAL_LENGTH=5000

lib_deps =
    mathieucarbou/ESPAsyncWebServer @ ^3.3.23
    mathieucarbou/AsyncTCP @ ^3.3.2
    https://github.com/NorthernMan54/rtl_433_ESP.git
    knolleary/PubSubClient @ ^2.8

[env:s3-usb]
upload_protocol = esptool
; upload_port = COM3          ; set to your board's serial port, or let PlatformIO auto-detect

[env:s3-wifi]
upload_protocol = espota
upload_port     = 192.168.1.50     ; <-- set to YOUR board's IP address for OTA updates
